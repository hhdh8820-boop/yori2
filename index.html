<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Yori 💜</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- SONIDO -->

<audio id="waves" loop>
    <source src="assets/audio/waves.mp3" type="audio/mpeg">
</audio>

<!-- FONDO -->

<div id="sky">

    <div class="stars"></div>

    <div class="moon"></div>

    <div class="ocean">

        <div class="wave wave1"></div>

        <div class="wave wave2"></div>

        <div class="wave wave3"></div>

    </div>

</div>

<!-- INTRO -->

<section id="intro">

    <div class="card">

        <h1>Para Yori.</h1>

        <p>

            Hay algo que llevo muchísimo tiempo queriéndote decir.

        </p>

        <button id="start">

            Comenzar

        </button>

    </div>

</section>

<!-- HISTORIA -->

<section id="storyScreen">

    <div id="storyContainer">

        <h2 id="chapter"></h2>

        <p id="storyText"></p>

    </div>

</section>

<script src="script.js"></script>

</body>

</html>
